name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: ./tayari_mobile
        run: flutter pub get

      - name: Build APK
        working-directory: ./tayari_mobile
        run: flutter build apk --release

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: "Tayari ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            **Tayari — AI Flood Early Warning & Early Action System**

            Download `app-release.apk` below and install on Android
            (enable "Install from unknown sources" if prompted).

            ---
            Changes in this release:
          files: tayari_mobile/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
