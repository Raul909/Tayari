name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: ./tayari_mobile
        run: flutter pub get

      - name: Build split (per-ABI) APKs
        working-directory: ./tayari_mobile
        # One APK per CPU architecture instead of a single ~85 MB universal APK.
        # Each is ~half the size, so users on slow connections download only the
        # native code their phone actually runs. Obfuscation strips symbols for a
        # smaller, harder-to-reverse binary; debug symbols are kept for
        # crash symbolication.
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/symbols

      - name: Create Release and Upload APKs
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: "Tayari ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            **Tayari — AI Flood Early Warning & Early Action System**

            ### Which file do I download?
            - **`app-arm64-v8a-release.apk`** — pick this on almost any phone from
              ~2019 onward. **← recommended, start here.**
            - `app-armeabi-v7a-release.apk` — only for older / low-cost 32-bit devices
              (use this if the arm64 file says "App not installed").

            Each file is ~half the size of a universal APK, so it downloads much
            faster on slow connections. Enable "Install from unknown sources" if
            prompted.

            ---
            Changes in this release:
          files: |
            tayari_mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            tayari_mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
