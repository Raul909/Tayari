<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Tayari — rising water warning">
  <rect width="512" height="512" rx="112" fill="#b7562f"/>
  <!-- Upward arrow: water level rising -->
  <path d="M256 104 L344 216 H296 V300 H216 V216 H168 Z"
        fill="#faf9f6" stroke="#faf9f6" stroke-width="8" stroke-linejoin="round"/>
  <!-- Flood waves rising at the base -->
  <path d="M84 356c36 0 36 30 72 30s36-30 72-30 36 30 72 30 36-30 72-30 36 30 72 30"
        fill="none" stroke="#faf9f6" stroke-width="28" stroke-linecap="round"/>
  <path d="M84 416c36 0 36 30 72 30s36-30 72-30 36 30 72 30 36-30 72-30 36 30 72 30"
        fill="none" stroke="#faf9f6" stroke-width="28" stroke-linecap="round" opacity="0.55"/>
</svg>
