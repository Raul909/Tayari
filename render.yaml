services:
  - type: web
    name: tayari-api
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://tayari.pages.dev
      - key: GROQ_API_KEY
        sync: false
      # Hugging Face token — NLLB-200 advisory translation + MMS-TTS voice notes.
      - key: HF_TOKEN
        sync: false
      # Twilio SMS — set these three in the Render dashboard to send real SMS.
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
